name: Build Android APK

on:
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android (Generate native code)
        run: npx expo prebuild --platform android --clean
        env:
          NODE_ENV: production

      - name: Force Kotlin 1.9.25
        run: |
          echo "android.kotlinVersion=1.9.25" >> android/gradle.properties
          echo "kotlinVersion=1.9.25" >> android/gradle.properties
          echo "suppressKotlinVersionCompatibilityCheck=true" >> android/gradle.properties
          # Global replacement in all gradle files
          find android -type f -name "*.gradle" -exec sed -i 's/1.9.24/1.9.25/g' {} +

      - name: Build APK (Assemble Release)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease -Pandroid.kotlinVersion=1.9.25 -PkotlinVersion=1.9.25 -PsuppressKotlinVersionCompatibilityCheck=true
        env:
          NODE_ENV: production

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk
