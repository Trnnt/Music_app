name: Build Android APK

on:
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean
        env:
          NODE_ENV: production

      - name: Build APK (Assemble Release)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1024m"
        env:
          NODE_ENV: production

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: v${{ github.run_number }}
          name: Build v${{ github.run_number }}
          body: |
            Premium Rimuru Music Build v${{ github.run_number }}
            ✨ Dynamic Backgrounds
            ✨ Glassmorphism UI
            ✨ Cloud Sync Placeholders
            
            Commit: ${{ github.sha }}
          files: android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk

