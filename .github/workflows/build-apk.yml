name: Build Android APK

on:
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Prebuild Android
        run: npx expo prebuild --platform android --no-install
        env:
          NODE_ENV: production

      - name: Build APK (Assemble Release)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleRelease --no-daemon --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx3072m -XX:MaxMetaspaceSize=1024m" \
            -Dorg.gradle.workers.max=1
        env:
          NODE_ENV: production
          NODE_OPTIONS: "--max-old-space-size=3072"


      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: v${{ github.run_number }}
          name: Build v${{ github.run_number }}
          body: |
            Rimuru Music Build v${{ github.run_number }}
            ✨ Premium Glassmorphism UI
            ✨ Dynamic Animated Backgrounds
            
            Commit: ${{ github.sha }}
          files: android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Diagnostic - Print Gradle Error Log
        if: failure()
        run: |
          if [ -f "android/app/build/reports/problems/problems-report.html" ]; then
            echo "Gradle Problem Report found!"
          fi
          # Print the last 100 lines of any gradle log if it failed
          find android -name "*.log" -exec tail -n 100 {} + || true


